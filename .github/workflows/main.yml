name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install
        working-directory: ./app

      - name: Build Docker Image
        run: docker build -t devops-assignment .

      - name: Run Container
        run: docker run -d -p 3000:3000 devops-assignment

      - name: Wait for App
        run: sleep 5

      - name: Test Application
        run: curl --fail http://localhost:3000
